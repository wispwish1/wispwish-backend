<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wispwish Navbar</title>
    <script src="js/i18n.js"></script>
    <style>
        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: #333;
            overflow-x: hidden;
            padding-top: 64px; /* To account for fixed navbar */
        }
        
        /* Animation keyframes */
        @keyframes pulse-soft {
            0%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(1.05);
            }
        }
        
        @keyframes slide-down {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Navbar styles */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #fce7f3;
            height: 64px;
        }
        
        .navbar-container {
            max-width: 80rem;
            margin-left: auto;
            margin-right: auto;
            padding: 0 1rem;
            height: 100%;
        }
        
        @media (min-width: 640px) {
            .navbar-container {
                padding: 0 1.5rem;
            }
        }
        
        @media (min-width: 1024px) {
            .navbar-container {
                padding: 0 2rem;
            }
        }
        
        .navbar-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        
        /* Logo styles */
        .logo-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none; /* Remove underline */
        }
        
        .logo-link:hover .logo-icon {
            transform: scale(1.1);
        }
        
        .logo-icon-container {
            position: relative;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            color: #ec4899;
            fill: currentColor;
            transition: transform 0.2s;
        }
        
        .logo-icon-pulse {
            position: absolute;
            inset: 0;
            animation: pulse-soft 2s infinite;
        }
        
        .logo-icon-pulse svg {
            width: 32px;
            height: 32px;
            color: #f9a8d4;
            opacity: 0.5;
            fill: currentColor;
        }
        
        .logo-text {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(to right, #db2777, #9333ea);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Desktop navigation */
        .desktop-nav {
            display: none;
        }
        
        @media (min-width: 768px) {
            .desktop-nav {
                display: block;
            }
        }
        
        .nav-items {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-left: 2.5rem;
        }
        
        .nav-link {
            padding: 0.5rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none; /* Remove underline */
        }
        
        .nav-link.active {
            color: #db2777;
            background-color: #fdf2f8;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }
        
        .nav-link:not(.active) {
            color: #4b5563;
        }
        
        .nav-link:not(.active):hover {
            color: #db2777;
            background-color: #fdf2f8;
        }
        
        /* Ensure active link doesn't change on hover */
        .nav-link.active:hover {
            color: #db2777;
            background-color: #fdf2f8;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }
        
        /* Mobile menu button */
        .mobile-menu-button {
            display: block;
            padding: 0.5rem;
            border-radius: 0.375rem;
            color: #4b5563;
            transition: all 0.2s;
        }
        
        @media (min-width: 768px) {
            .mobile-menu-button {
                display: none;
            }
        }
        
        .mobile-menu-button:hover {
            color: #db2777;
            background-color: #fdf2f8;
        }
        
        .menu-icon {
            width: 24px;
            height: 24px;
        }
        
        /* Mobile menu */
        .mobile-menu {
            display: none;
            animation: slide-down 0.3s ease-out;
        }
        
        @media (min-width: 768px) {
            .mobile-menu {
                display: none;
            }
        }
        
        .mobile-nav-items {
            padding: 0.5rem 0.5rem 1rem;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #fce7f3;
        }
        
        .mobile-nav-link {
            display: block;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none; /* Remove underline */
        }
        
        .mobile-nav-link.active {
            color: #db2777;
            background-color: #fdf2f8;
        }
        
        .mobile-nav-link:not(.active) {
            color: #4b5563;
        }
        
        .mobile-nav-link:not(.active):hover {
            color: #db2777;
            background-color: #fdf2f8;
        }
        
        /* Ensure active mobile link doesn't change on hover */
        .mobile-nav-link.active:hover {
            color: #db2777;
            background-color: #fdf2f8;
        }
        
        /* Demo content */
        .demo-content {
            max-width: 72rem;
            margin: 2rem auto;
            padding: 0 1rem;
            text-align: center;
        }
        
        .demo-content h1 {
            font-size: 2.25rem;
            font-weight: bold;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #db2777, #9333ea);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .demo-content p {
            font-size: 1.125rem;
            color: #4b5563;
            margin-bottom: 2rem;
        }
        
        .page-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .page-link {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            background-color: #fdf2f8;
            color: #db2777;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .page-link:hover {
            background-color: #fce7f3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-inner">
                <a href="/" class="logo-link">
                    <div class="logo-icon-container">
                        <svg class="logo-icon" viewBox="0 0 24 24">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                        <div class="logo-icon-pulse">
                            <svg viewBox="0 0 24 24">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                        </div>
                    </div>
                    <span class="logo-text">Wispwish</span>
                </a>

                <div class="desktop-nav">
                    <div class="nav-items">
                        <a href="/" class="nav-link">Home</a>
                        <a href="/giftgenerator.html" class="nav-link">Create Gift</a>
                        <a href="/wisknot.html" class="nav-link">WishKnot</a>
                        <!-- <a href="/gallery.html" class="nav-link">Gallery</a> -->
                        <a href="/how-it-works.html" class="nav-link">How It Works</a>
                        <a href="/pricing.html" class="nav-link">Pricing</a>
                        <div id="auth-actions" style="display:flex; gap:10px; align-items:center; margin-left:20px;">
                          <a href="/login.html" class="nav-link" style="background:#fdf2f8;">Login</a>
                        </div>
                    </div>
                </div>

                <button class="mobile-menu-button" id="menu-toggle">
                    <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div class="mobile-menu" id="mobile-menu" >
            <div class="mobile-nav-items">
                <a href="/" class="mobile-nav-link">Home</a>
                <a href="/giftgenerator.html" class="mobile-nav-link">Create Gift</a>
                <a href="/wisknot.html" class="mobile-nav-link">WishKnot</a>
                <!-- <a href="/gallery.html" class="mobile-nav-link">Gallery</a> -->
                <a href="/how-it-works.html" class="mobile-nav-link">How It Works</a>
                <a href="/pricing.html" class="mobile-nav-link">Pricing</a>
                <div id="mobile-auth-actions" style="display:flex; gap:10px; padding:8px 0;">
                  <a href="/login.html" class="mobile-nav-link" style="flex:1; text-align:center;">Login</a>
                </div>
            </div>
        </div>
    </nav>

  <script src="js/navbar.js"></script>
  <script>
    window.initNavbar = window.initNavbar || function initNavbar() {
      const menuToggle = document.getElementById('menu-toggle');
      const mobileMenu = document.getElementById('mobile-menu');
      if (!menuToggle || !mobileMenu) return;

      // Ensure initial state is closed on small screens
      mobileMenu.style.display = 'none';

      // Toggle mobile menu
      menuToggle.onclick = function() {
        const isOpen = mobileMenu.style.display === 'block';
        mobileMenu.style.display = isOpen ? 'none' : 'block';
        menuToggle.innerHTML = isOpen
          ? `<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <line x1="3" y1="6" x2="21" y2="6"></line>
               <line x1="3" y1="12" x2="21" y2="12"></line>
               <line x1="3" y1="18" x2="21" y2="18"></line>
             </svg>`
          : `<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <line x1="18" y1="6" x2="6" y2="18"></line>
               <line x1="6" y1="6" x2="18" y2="18"></line>
             </svg>`;
      };

      // Close menu on link click
      const mobileLinks = document.querySelectorAll('.mobile-nav-link');
      mobileLinks.forEach(link => {
        link.addEventListener('click', function() {
          mobileMenu.style.display = 'none';
          menuToggle.innerHTML = `<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                     <line x1="3" y1="6" x2="21" y2="6"></line>
                                     <line x1="3" y1="12" x2="21" y2="12"></line>
                                     <line x1="3" y1="18" x2="21" y2="18"></line>
                                   </svg>`;
        });
      });

      // Active link logic
      (function setActiveLink() {
        let currentUrl = window.location.href;
        if (currentUrl.endsWith('/')) {
          currentUrl = currentUrl.slice(0, -1);
        }
        const allLinks = document.querySelectorAll('.nav-link, .mobile-nav-link');
        allLinks.forEach(link => {
          const linkHref = link.getAttribute('href');
          if (linkHref === '/') {
            const baseUrl = window.location.protocol + '//' + window.location.host;
            if (currentUrl === baseUrl || currentUrl === baseUrl + '/index.html') {
              link.classList.add('active');
            } else {
              link.classList.remove('active');
            }
          } else {
            if (currentUrl.includes(linkHref)) {
              link.classList.add('active');
            } else {
              link.classList.remove('active');
            }
          }
        });
      })();

      (function renderAuthActions(){
        const defaultBackendHost = window.BACKEND_BASE_URL || 
          (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:5001' 
            : 'https://wispwish-backend.vercel.app');
        const token = localStorage.getItem('token');
        const desktopAuth = document.getElementById('auth-actions');
        const mobileAuth = document.getElementById('mobile-auth-actions');
        if (!desktopAuth && !mobileAuth) return;

        function setLoggedOut(){
          if (desktopAuth) desktopAuth.innerHTML = `
            <a href="/login.html" class="nav-link" style="background:#fdf2f8;">Login</a>
          `;
          if (mobileAuth) mobileAuth.innerHTML = `
            <a href="/login.html" class="mobile-nav-link" style="flex:1; text-align:center;">Login</a>
          `;
        }

        function setLoggedIn(){
          const desktopHtml = `
            <div class="flex items-center gap-3">
              <a href="/account.html" class="nav-link" style="background:#ecfeff;color:#036666;">My Account</a>
            </div>
          `;
          const mobileHtml = `
            <div class="flex flex-col gap-2 w-full">
              <a href="/account.html" class="mobile-nav-link" style="background:#ecfeff;color:#036666;">My Account</a>
            </div>
          `;
          if (desktopAuth) desktopAuth.innerHTML = desktopHtml;
          if (mobileAuth) mobileAuth.innerHTML = mobileHtml;
        }

        function logout(){
          localStorage.removeItem('token');
          localStorage.removeItem('userEmail');
          localStorage.removeItem('userName');
          localStorage.removeItem('userId');
          localStorage.removeItem('userPlan');
          window.location.href = '/login.html';
        }

        if (!token) {
          setLoggedOut();
          return;
        }

        // Optimistically show logged in state for better UX
        setLoggedIn();

        fetch(`${defaultBackendHost}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } })
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(data => {
            const user = data && data.user ? data.user : null;
            if (!user) {
              setLoggedOut();
            }
          })
          .catch(() => {
            // Keep logged-in UI if the backend check fails temporarily
            console.log('Navbar auth check failed, keeping logged-in state');
          });
      })();
    };

    // Auto-init when navbar.html is opened directly in the browser
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() { window.initNavbar && window.initNavbar(); });
    } else {
      window.initNavbar && window.initNavbar();
    }
  </script>

</body>
</html>
